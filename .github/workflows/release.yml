name: Release APK

# Triggered when a tag matching `v*` is pushed (e.g. `v0.1.0-beta`, `v1.2.3`).
# The workflow builds a signed release APK and publishes it as a GitHub Release
# with auto-generated changelog from the commits since the previous tag.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64        — the stash-release.jks file base64-encoded
#   KEYSTORE_PASSWORD      — store password for the keystore
#   KEY_ALIAS              — alias of the signing key (usually "stash")
#   KEY_PASSWORD           — password for the signing key inside the keystore

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'split-apks'
  workflow_dispatch:

permissions:
  contents: write  # required to create the GitHub Release and upload assets

jobs:
  build-release:
    name: Build and publish signed release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for changelog generation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See SECURITY.md and README for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/stash-release.jks"
          echo "Decoded keystore to $RUNNER_TEMP/stash-release.jks"
          ls -la "$RUNNER_TEMP/stash-release.jks"

      - name: Assemble release APK
        env:
          STASH_KEYSTORE_FILE: ${{ runner.temp }}/stash-release.jks
          STASH_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          STASH_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STASH_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: ./gradlew :app:assembleRelease

      - name: Prepare APKs for release
        id: prepare_apks
        run: |
          TAG="${GITHUB_REF_NAME}"
          DEST="$RUNNER_TEMP/release_artifacts"
          mkdir -p "$DEST"
          
          # Find all APKs in the release output directory
          # When ABI splits are enabled, AGP produces app-<abi>-release.apk and app-universal-release.apk
          FILES=$(find app/build/outputs/apk/release -name "*.apk")
          
          if [ -z "$FILES" ]; then
            echo "::error::No release APKs found in app/build/outputs/apk/release"
            exit 1
          fi
          
          for apk in $FILES; do
            FILENAME=$(basename "$apk")
            # app-arm64-v8a-release.apk -> Stash-v1.0.0-arm64-v8a.apk
            # app-universal-release.apk -> Stash-v1.0.0-universal.apk
            NEW_NAME=$(echo "$FILENAME" | sed "s/app-/Stash-${TAG}-/" | sed "s/-release//" | sed "s/Stash-${TAG}-\.apk/Stash-${TAG}.apk/")
            
            cp "$apk" "$DEST/$NEW_NAME"
            echo "Prepared: $NEW_NAME ($(du -h "$apk" | cut -f1))"
          done
          
          ls -la "$DEST"

      - name: Extract tag annotation as release body
        id: tag_body
        run: |
          # Pull the tag's annotation (git tag -a -m "...") and emit it as a
          # GITHUB_OUTPUT heredoc so multi-line notes survive. Strip any PGP
          # signature block that git may append to signed tags. Falls back
          # to an empty body if the tag has no annotation (lightweight tag).
          RAW=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          BODY=$(printf '%s' "$RAW" | sed '/^-----BEGIN PGP SIGNATURE-----/,$d')
          {
            echo 'body<<STASH_EOF'
            printf '%s\n' "$BODY"
            echo 'STASH_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Clean up keystore from runner
        if: always()
        run: |
          # Ensure the decoded keystore file is removed from the runner disk
          # regardless of whether the build succeeded or failed.
          rm -f "$RUNNER_TEMP/stash-release.jks"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stash ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          # Auto-append a "What's Changed" commit list under our custom body
          # so the raw commit history is still there if someone wants it.
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: ${{ runner.temp }}/release_artifacts/*.apk
          body: |
            ${{ steps.tag_body.outputs.body }}

            ---

            ## Install

            Download the `.apk` below and open it on your Android device. If you've got a previous Stash release installed, this upgrades in place — your library, sync history, and settings are preserved.

            **Requires:** Android 8.0 (API 26) or newer.

            See the [README](https://github.com/rawnaldclark/Stash#installation) for first-time setup.
